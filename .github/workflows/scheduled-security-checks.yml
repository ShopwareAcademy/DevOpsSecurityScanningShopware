name: Scheduled security checks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

env:
  SHOPWARE_CI_IMAGE: ghcr.io/shopware/docker-dev-ci-test:203-php8.5.4-node24-nginx
  NPM_AUDIT_DIR: storefront

jobs:
  container-scan:
    name: Container scan
    runs-on: ubuntu-24.04
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.SHOPWARE_CI_IMAGE }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  composer-audit:
    name: Composer audit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run composer audit
        run: |
          if [ ! -f composer.lock ]; then
            echo "No composer.lock found. Nothing to audit here."
            exit 0
          fi

          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "${SHOPWARE_CI_IMAGE}" \
            sh -lc 'composer audit --format=json > composer-audit-report.json || true'

      - name: Upload composer audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: composer-audit-report
          path: composer-audit-report.json
          if-no-files-found: ignore

  npm-audit:
    name: NPM audit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run npm audit
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e NPM_AUDIT_DIR="${NPM_AUDIT_DIR}" \
            "${SHOPWARE_CI_IMAGE}" \
            sh -lc '
              if [ ! -d "$NPM_AUDIT_DIR" ]; then
                echo "No ${NPM_AUDIT_DIR} directory found. Set NPM_AUDIT_DIR to the directory that contains package-lock.json."
                exit 0
              fi

              if [ ! -f "$NPM_AUDIT_DIR/package-lock.json" ]; then
                echo "No package-lock.json found in ${NPM_AUDIT_DIR}. Nothing to audit here."
                exit 0
              fi

              cd "$NPM_AUDIT_DIR"
              npm ci
              npm audit --audit-level=high --json > npm-audit-report.json || true
            '

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: ${{ env.NPM_AUDIT_DIR }}/npm-audit-report.json
          if-no-files-found: ignore
